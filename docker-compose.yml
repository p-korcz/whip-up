version: '3.9'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: whip-up-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: whip-up-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=recipes
      - PORT=3001
    depends_on:
      - elasticsearch

  crawler:
    build:
      context: ./packages/crawler
      dockerfile: Dockerfile
    container_name: whip-up-crawler
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=recipes
      - CRAWL_INTERVAL_HOURS=${CRAWL_INTERVAL_HOURS:-24}
    command: >
      sh -c "while true; do
        node dist/index.js;
        echo \"Next crawl in $${CRAWL_INTERVAL_HOURS:-24}h\";
        sleep $$(( $${CRAWL_INTERVAL_HOURS:-24} * 3600 ));
      done"
    depends_on:
      - elasticsearch
    restart: on-failure

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: whip-up-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  elasticsearch_data:
