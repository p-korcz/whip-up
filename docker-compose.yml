version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: whip-up-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: whip-up-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=recipes
      - PORT=3001
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: whip-up-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
